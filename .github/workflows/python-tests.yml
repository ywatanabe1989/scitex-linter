name: Tests

on:
  push:
    branches: [main, develop]
    paths: ["src/**", "tests/**", "pyproject.toml"]
  pull_request:
    branches: [main, develop]
    paths: ["src/**", "tests/**", "pyproject.toml"]

  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: test-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Soft-migration window: scitex-linter is a shim re-exporting
          # from scitex_dev.linter, which isn't on PyPI yet. Install
          # scitex-dev from the develop branch so the shim resolves.
          pip install "git+https://github.com/ywatanabe1989/scitex-dev.git@develop"
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=scitex_linter --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
